<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080c14">
<title>OLX Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080c14;--s1:#0d1220;--s2:#111827;--border:#1e2d45;--green:#00e5a0;--blue:#0ea5e9;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
html{background:var(--bg)}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:rgba(13,18,32,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 14px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;align-items:center;gap:8px}
.badge{background:var(--green);color:#0a1628;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace}
.btn-ic{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
.btn-ic:active{transform:scale(.93)}
.search-wrap{position:relative}
.search-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:8px 12px 8px 34px;font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none}
.filters{overflow-x:auto;padding:8px 14px 0;display:flex;gap:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.f-btn{flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'Space Grotesk',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s}
.f-btn.active{background:rgba(0,229,160,.12);border-color:var(--green);color:var(--green)}
.sort-bar{padding:6px 14px;display:flex;gap:5px;border-bottom:1px solid var(--border)}
.s-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer}
.s-btn.active{background:rgba(14,165,233,.12);border-color:var(--blue);color:var(--blue)}
.grid-wrap{padding:10px 10px calc(var(--safe-bot)+70px)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .12s;animation:up .25s ease both}
.card:active{transform:scale(.96)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.img-wrap{position:relative;width:100%;padding-bottom:100%;background:var(--s2);overflow:hidden}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.no-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--muted)}
.badge-def{position:absolute;top:5px;left:5px;font-size:8px;padding:2px 5px;border-radius:8px;background:rgba(239,68,68,.85);color:#fff;font-weight:700;font-family:'JetBrains Mono',monospace}
.fn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:none;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;z-index:2}
.fn:active{background:rgba(0,229,160,.7)}
.fp{left:4px}.fnx{right:4px}
.fdots{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:3px}
.dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.35)}
.dot.on{background:#fff}
.card-body{padding:7px 9px 9px}
.card-cat{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.card-title{font-size:11px;font-weight:600;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-price{font-size:12px;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace}
/* Sheet */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.ov.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--s1);border-radius:18px 18px 0 0;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);padding-bottom:calc(var(--safe-bot)+12px)}
.sheet.on{transform:translateY(0)}
.handle{width:32px;height:3px;background:var(--border);border-radius:2px;margin:10px auto 12px}
.sh-img-wrap{position:relative;background:var(--s2)}
.sh-img{width:100%;max-height:220px;object-fit:cover;display:block}
.sh-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);border:none;color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
#shP{left:9px}#shN{right:9px}
.sh-dots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.sh-body{padding:14px}
.sh-cat{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.sh-title{font-size:17px;font-weight:700;line-height:1.2;margin-bottom:7px}
.sh-price{font-size:22px;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.sh-meta{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;line-height:1.9}
.sh-desc{font-size:13px;color:#94a3b8;line-height:1.65;margin-bottom:14px;white-space:pre-wrap}
.btns{display:flex;flex-direction:column;gap:7px}
.btn-a{display:block;text-align:center;padding:12px;border-radius:11px;font-size:13px;font-weight:700;text-decoration:none}
.btn-olx{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--green)}
.btn-olx:active{background:rgba(0,229,160,.2)}
.btn-buy{background:linear-gradient(135deg,var(--green),#00c484);color:#0a1628}
.btn-buy:active{opacity:.85}
/* States */
.st-box{text-align:center;padding:50px 20px;color:var(--muted);grid-column:1/-1}
.st-ic{font-size:40px;margin-bottom:12px;opacity:.4}
.st-ttl{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px}
.st-sub{font-size:11px;font-family:'JetBrains Mono',monospace;line-height:1.6}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .75s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(var(--safe-bot)+14px);left:50%;transform:translateX(-50%) translateY(60px);background:var(--s1);border:1px solid var(--green);border-radius:9px;padding:8px 14px;font-size:12px;color:var(--green);font-family:'JetBrains Mono',monospace;z-index:300;transition:transform .25s;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <span class="logo">🎮 OLX Dashboard</span>
    <div class="header-right">
      <span class="badge" id="tot">0</span>
      <button class="btn-ic" id="btnSync">⟳</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="srch" placeholder="Buscar anúncio...">
  </div>
</div>
<div class="filters" id="fils"></div>
<div class="sort-bar">
  <button class="s-btn active" data-s="recente">↓ Recente</button>
  <button class="s-btn" data-s="menor">↑ Menor preço</button>
  <button class="s-btn" data-s="maior">↓ Maior preço</button>
</div>
<div class="grid-wrap"><div class="grid" id="grid"><div class="st-box"><div class="spinner"></div><div class="st-ttl">Carregando...</div></div></div></div>

<!-- Sheet -->
<div class="ov" id="ov"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="sh-img-wrap" id="shIW">
    <img class="sh-img" id="shImg" style="display:none">
    <button class="sh-nav" id="shP" style="display:none">❮</button>
    <button class="sh-nav" id="shN" style="display:none">❯</button>
    <div class="sh-dots" id="shDots"></div>
  </div>
  <div class="sh-body">
    <div class="sh-cat"   id="shCat"></div>
    <div class="sh-title" id="shTitle"></div>
    <div class="sh-price" id="shPrice"></div>
    <div class="sh-meta"  id="shMeta"></div>
    <div class="sh-desc"  id="shDesc"></div>
    <div class="btns">
      <a class="btn-a btn-olx" id="shLink" href="#" target="_blank">🔗 Abrir na OLX</a>
      <a class="btn-a btn-buy" id="shBuy"  href="#" target="_blank">🛒 Comprar com segurança</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
// URLs de onde buscar os anúncios — tenta em ordem até encontrar
const GITHUB_USER = "Drakezera1337";
const GITHUB_REPO = "Olx-Dashboard";
const VER = "3"; // incremente para forçar o Telegram recarregar o app
const DATA_URLS = [
  `https://${GITHUB_USER.toLowerCase()}.github.io/${GITHUB_REPO}/anuncios.json`,
  `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/anuncios.json`,
  `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/master/anuncios.json`,
];

const CATS = [
  {id:"todos",nome:"Todos",icon:"🎮"},
  {id:"ps5",  nome:"PS5",  icon:"🎮",p:["ps5","playstation 5"]},
  {id:"ps4",  nome:"PS4",  icon:"🎮",p:["ps4","playstation 4"]},
  {id:"ps3",  nome:"PS3",  icon:"🎮",p:["ps3","playstation 3"]},
  {id:"xbox", nome:"Xbox", icon:"🟩",p:["xbox","series s","series x"]},
  {id:"switch",nome:"Switch",icon:"🔴",p:["nintendo","switch"]},
  {id:"iphone",nome:"iPhones",icon:"📱",p:["iphone"]},
  {id:"outros",nome:"Outros",icon:"📦"},
];

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#080c14'); tg.setBackgroundColor('#080c14'); }

var ads=[], filtro="todos", ordem="recente", busca="", fidx={}, shFs=[], shFi=0, loading=false;

// ─── Detecta categoria ───────────────────────────────────────────────────────
function cat(txt){
  const t=txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  for(let i=1;i<CATS.length-1;i++){const c=CATS[i];if(c.p&&c.p.some(p=>t.includes(p)))return c.id;}
  return "outros";
}

// ─── Carrega anúncios do JSON ────────────────────────────────────────────────
// O arquivo anuncios.json é publicado no GitHub Pages pela extensão
async function carregar() {
  loading=true;
  document.getElementById("btnSync").textContent="⏳";
  
  let data = null;
  let erroFinal = "";

  for (const url of DATA_URLS) {
    try {
      const r = await fetch(url + '?t=' + Date.now(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' }
      });
      if (!r.ok) { erroFinal = "HTTP " + r.status + " em " + url.split('/').pop(); continue; }
      const json = await r.json();
      data = Array.isArray(json) ? json : json.anuncios || [];
      toast("✓ Carregado de " + (url.includes('github.io') ? 'Pages' : 'GitHub'));
      break;
    } catch(e) {
      erroFinal = e.message.slice(0,40);
      continue;
    }
  }

  if (data) {
    ads = data
      .map(a => {
        // Compatibilidade: Monitor usa fotos[]/url, Dashboard usa fotosUrls[]/fotoUrl/link
        const fotos = a.fotosUrls?.length ? a.fotosUrls : (a.fotos?.length ? a.fotos : (a.fotoUrl ? [a.fotoUrl] : []));
        const link  = a.link || a.url || "";
        return {
          ...a,
          fotoUrl:   fotos[0] || null,
          fotosUrls: fotos,
          link,
          categoria: a.categoria || cat((a.titulo||'') + ' ' + (a.descricao||'')),
          precoRaw:  a.precoRaw || (a.preco ? 'R$ ' + Math.round(a.preco).toLocaleString('pt-BR') : 'Sob consulta'),
        };
      })
      .sort((a,b) => b.ts - a.ts)
      .slice(0, 500);
    localStorage.setItem('olx_ads_v3', JSON.stringify(ads.slice(0,500)));
    localStorage.removeItem('olx_ads_backup'); // limpa versão antiga
    renderizar();
  } else {
    // Fallback: cache local
    try {
      const bk = localStorage.getItem('olx_ads_v3') || localStorage.getItem('olx_ads_backup');
      if (bk) { ads = JSON.parse(bk); renderizar(); toast("Cache local (" + ads.length + ")"); }
      else {
        grid(`<div class="st-box"><div class="st-ic">📡</div><div class="st-ttl">Sem conexão</div><div class="st-sub">Erro: ${erroFinal}<br><br>Verifique:<br>• Repositório é público?<br>• anuncios.json existe na raiz?<br>• GitHub Repo no Monitor: ${GITHUB_USER}/${GITHUB_REPO}</div></div>`);
        toast("Erro: " + erroFinal);
      }
    } catch(e2) {
      grid(`<div class="st-box"><div class="st-ic">📡</div><div class="st-ttl">Sem conexão</div><div class="st-sub">${erroFinal}</div></div>`);
    }
  }

  document.getElementById("btnSync").textContent="⟳";
  loading=false;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function filtrados(){
  let l=ads.slice();
  if(filtro!=="todos")l=l.filter(a=>a.categoria===filtro);
  if(busca.trim()){const q=busca.toLowerCase();l=l.filter(a=>(a.titulo||"").toLowerCase().includes(q)||(a.descricao||"").toLowerCase().includes(q));}
  if(ordem==="menor")l.sort((a,b)=>(a.preco||999999)-(b.preco||999999));
  else if(ordem==="maior")l.sort((a,b)=>(b.preco||0)-(a.preco||0));
  else l.sort((a,b)=>b.ts-a.ts);
  return l;
}

function buildFiltros(){
  const c={};CATS.forEach(x=>c[x.id]=0);c.todos=ads.length;
  ads.forEach(a=>{if(c[a.categoria]!==undefined)c[a.categoria]++;else c.outros++;});
  document.getElementById("fils").innerHTML=CATS.map(x=>
    `<button class="f-btn${filtro===x.id?" active":""}" data-c="${x.id}">${x.icon} ${x.nome} <span style="opacity:.5;font-size:9px;font-family:'JetBrains Mono',monospace">${c[x.id]||0}</span></button>`
  ).join("");
  document.querySelectorAll(".f-btn").forEach(b=>b.addEventListener("click",()=>{filtro=b.dataset.c;renderizar();}));
}

function grid(html){document.getElementById("grid").innerHTML=html;}

function renderizar(){
  document.getElementById("tot").textContent=ads.length;
  buildFiltros();
  const lista=filtrados();
  if(!lista.length){grid(`<div class="st-box"><div class="st-ic">🔍</div><div class="st-ttl">Nenhum anúncio</div><div class="st-sub">Tente outro filtro</div></div>`);return;}
  grid(lista.map((a,i)=>{
    const delay=Math.min(i*18,200);
    const fotos=a.fotosUrls?.length?a.fotosUrls:(a.fotoUrl?[a.fotoUrl]:[]);
    const ci=fidx[a.id]||0;
    const imgH=fotos.length?`<img class="card-img" src="${fotos[ci]}" loading="lazy" onerror="this.style.display='none'">`:`<div class="no-img">🎮</div>`;
    const setH=fotos.length>1?`<button class="fn fp" data-id="${a.id}" data-d="-1">❮</button><button class="fn fnx" data-id="${a.id}" data-d="1">❯</button><div class="fdots">${fotos.map((_,j)=>`<span class="dot${j===ci?" on":""}"></span>`).join("")}</div>`:"";
    const catNome=(CATS.find(c=>c.id===a.categoria)||{nome:""}).nome;
    return `<div class="card" data-id="${a.id}" style="animation-delay:${delay}ms">
      <div class="img-wrap">${imgH}${a.defeito?'<div class="badge-def">⚠️ DEFEITO</div>':''}${setH}</div>
      <div class="card-body">
        <div class="card-cat">${catNome}</div>
        <div class="card-title">${esc(a.titulo)}</div>
        <div class="card-price">${esc(a.precoRaw||"Sob consulta")}</div>
      </div>
    </div>`;
  }).join(""));
  // Setas fotos
  document.querySelectorAll(".fn").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const id=b.dataset.id, a=ads.find(x=>x.id===id);
    if(!a)return;
    const fs=a.fotosUrls?.length?a.fotosUrls:(a.fotoUrl?[a.fotoUrl]:[]);
    let idx=(fidx[id]||0)+parseInt(b.dataset.d);
    if(idx<0)idx=fs.length-1;if(idx>=fs.length)idx=0;
    fidx[id]=idx;
    const img=document.querySelector(`.card[data-id="${id}"] .card-img`);
    const dots=document.querySelector(`.card[data-id="${id}"] .fdots`);
    if(img)img.src=fs[idx];
    if(dots)dots.innerHTML=fs.map((_,j)=>`<span class="dot${j===idx?" on":""}"></span>`).join("");
  }));
  // Abre sheet
  document.querySelectorAll(".card").forEach(el=>el.addEventListener("click",e=>{
    if(e.target.closest(".fn"))return;
    const a=ads.find(x=>x.id===el.dataset.id);
    if(a)abrirSheet(a);
  }));
}

// ─── Sheet ────────────────────────────────────────────────────────────────────
function abrirSheet(a){
  shFs=a.fotosUrls?.length?a.fotosUrls:(a.fotoUrl?[a.fotoUrl]:[]);
  shFi=fidx[a.id]||0;
  updShFoto();
  document.getElementById("shCat").textContent=(CATS.find(c=>c.id===a.categoria)||{nome:""}).nome;
  document.getElementById("shTitle").textContent=a.titulo;
  document.getElementById("shPrice").textContent=a.precoRaw||"Sob consulta";
  const meta=[];
  if(a.publicado)meta.push("📅 "+a.publicado);
  if(a.detectado)meta.push("🔍 "+a.detectado);
  if(a.tempoOlx)meta.push("🏪 "+a.tempoOlx);
  document.getElementById("shMeta").textContent=meta.join("\n");
  document.getElementById("shDesc").textContent=a.descricao||"Sem descrição.";
  const lk=document.getElementById("shLink"), by=document.getElementById("shBuy");
  lk.href=a.link||"#"; lk.style.display=a.link?"block":"none";
  const m=(a.link||"").match(/-(\d{7,})(?:[?#]|$)/);
  by.href=m?`https://comprasegura.olx.com.br/?listId=${m[1]}&source=ADVIEW`:"#";
  by.style.display=m?"block":"none";
  document.getElementById("shP").style.display=shFs.length>1?"flex":"none";
  document.getElementById("shN").style.display=shFs.length>1?"flex":"none";
  document.getElementById("ov").classList.add("on");
  document.getElementById("sheet").classList.add("on");
  if(tg)tg.BackButton.show();
}
function updShFoto(){
  const img=document.getElementById("shImg"), dots=document.getElementById("shDots");
  img.src=shFs[shFi]||""; img.style.display=shFs.length?"block":"none";
  dots.innerHTML=shFs.map((_,i)=>`<span class="dot${i===shFi?" on":""}"></span>`).join("");
}
function fecharSheet(){
  document.getElementById("ov").classList.remove("on");
  document.getElementById("sheet").classList.remove("on");
  if(tg)tg.BackButton.hide();
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),2500);}

// ─── Events ───────────────────────────────────────────────────────────────────
document.getElementById("btnSync").addEventListener("click",()=>{if(!loading)carregar();});
document.getElementById("srch").addEventListener("input",function(){busca=this.value;renderizar();});
document.querySelectorAll(".s-btn").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".s-btn").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); ordem=b.dataset.s; renderizar();
}));
document.getElementById("shP").addEventListener("click",()=>{shFi=shFi>0?shFi-1:shFs.length-1;updShFoto();});
document.getElementById("shN").addEventListener("click",()=>{shFi=shFi<shFs.length-1?shFi+1:0;updShFoto();});
document.getElementById("ov").addEventListener("click",fecharSheet);
if(tg)tg.BackButton.onClick(fecharSheet);
// Swipe para fechar
let sY=0;
document.getElementById("sheet").addEventListener("touchstart",e=>sY=e.touches[0].clientY,{passive:true});
document.getElementById("sheet").addEventListener("touchend",e=>{if(e.changedTouches[0].clientY-sY>70)fecharSheet();},{passive:true});

carregar();

setInterval(() => { if (!loading) carregar(); }, 60000);
